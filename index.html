<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>たべっ子どうぶつ紹介</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fff8e1;
      text-align: center;
    }

    header {
      background: #ffcc80;
      padding: 20px;
      font-size: 28px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      display: inline-block;
      background: white;
      width: 200px;
      margin: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px 10px 0 0;
    }

    .card h3 {
      margin: 10px 0;
      color: #333;
    }

    .card p {
      padding: 0 10px 15px;
      font-size: 14px;
      color: #666;
    }

    footer {
      margin-top: 30px;
      padding: 10px;
      background: #ffe0b2;
    }

    button {
      padding: 10px 20px;
      background: #ff9800;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      background: #f57c00;
    }
  </style>
</head>

<body>

<header>
  🐻 たべっ子どうぶつ紹介 🐰
</header>

<div class="container">

  <div class="card">
    <img src="https://placehold.jp/200x150.png?text=Lion" alt="ライオン">
    <h3>ライオン</h3>
    <p>王様っぽくてかっこいい！人気No.1キャラ</p>
  </div>

  <div class="card">
    <img src="https://placehold.jp/200x150.png?text=Elephant" alt="ゾウ">
    <h3>ゾウ</h3>
    <p>鼻が長くて優しい性格のどうぶつ</p>
  </div>

  <div class="card">
    <img src="https://placehold.jp/200x150.png?text=Rabbit" alt="ウサギ">
    <h3>ウサギ</h3>
    <p>かわいさ抜群！子どもに大人気</p>
  </div>

  <div class="card">
    <img src="https://placehold.jp/200x150.png?text=Giraffe" alt="キリン">
    <h3>キリン</h3>
    <p>首が長くてオシャレな存在</p>
  </div>

  <button onclick="showMessage()">もっと好きになる！</button>

</div>

<footer>
  © 2026 たべっ子どうぶつファンページ
</footer>

<script>
function showMessage() {
  alert("たべっ子どうぶつはおいしくて楽しいお菓子です！");
}
</script>

</body>
</html>
